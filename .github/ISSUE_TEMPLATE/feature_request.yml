name: 기능 요청
description: 프로젝트에 추가되면 좋을 기능을 제안합니다.
title: "[Feature]: "
labels:
  - enhancement

body:
  - type: textarea
    attributes:
      label: 해결하고 싶은 문제
      description: 어떤 문제나 불편함을 해결하고 싶은지 설명해 주세요.
      placeholder: 이 프로젝트를 사용하면서 어떤 점이 불편했는지 적어 주세요.
    validations:
      required: true

  - type: textarea
    attributes:
      label: 제안하는 해결 방법
      description: 원하는 기능이나 구현 방향을 설명해 주세요.
      placeholder: 어떤 기능이 추가되면 좋을지 적어 주세요.
    validations:
      required: true
