name: 버그 리포트
description: 오류나 예상과 다른 동작을 제보합니다.
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        이슈를 등록하기 전에 README와 실행 방법을 먼저 확인해 주세요. 민감한 API Key나 개인 정보는 포함하지 마세요.

  - type: textarea
    attributes:
      label: 현재 동작
      description: 겪고 있는 문제를 설명해 주세요.
      placeholder: 어떤 작업을 했을 때 어떤 오류가 발생했는지 적어 주세요.
    validations:
      required: true

  - type: textarea
    attributes:
      label: 재현 방법
      description: 문제를 재현하는 단계를 자세히 적어 주세요.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    attributes:
      label: 오류 로그
      description: 오류 메시지나 로그를 붙여 주세요. 민감한 정보는 제거해 주세요.
      placeholder: 오류 메시지, 로그, 스크린샷 등
    validations:
      required: true

  - type: input
    attributes:
      label: Python 버전
      description: 사용 중인 Python 버전
      placeholder: v3.11.0 등
    validations:
      required: true

  - type: input
    attributes:
      label: 운영체제
      description: 사용 중인 운영체제 정보
      placeholder: macOS 14.1, Windows 11, Ubuntu 22.04 등
    validations:
      required: true

  - type: input
    attributes:
      label: MoneyPrinterTurbo 버전
      description: 사용 중인 MoneyPrinterTurbo 버전
      placeholder: v1.2.9 등
    validations:
      required: true

  - type: textarea
    attributes:
      label: 추가 정보
      description: 문제 해결에 도움이 될 만한 추가 정보를 적어 주세요.
    validations:
      required: false
